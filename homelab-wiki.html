<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Lab Wiki — 50 Projects</title>
<style>
:root {
  --bg-primary:     #0f1117;
  --bg-secondary:   #161b27;
  --bg-card:        #1a2133;
  --bg-hover:       #1f2a3d;
  --border-card:    1px solid #2e3d55;
  --border-hover:   1px solid #4a6080;
  --border-accent:  1px solid #3b82f6;
  --text-primary:   #e8edf5;
  --text-secondary: #8b9ab5;
  --text-muted:     #4e5d75;
  --text-accent:    #60a5fa;
  --radius-sm:      6px;
  --radius-md:      10px;
  --radius-lg:      14px;
  --phase1-bg:      #0d2e1f; --phase1-text: #4ade80; --phase1-border: #166534;
  --phase2-bg:      #0c1f3d; --phase2-text: #60a5fa; --phase2-border: #1d4ed8;
  --phase3-bg:      #2d1a06; --phase3-text: #fb923c; --phase3-border: #92400e;
  --phase4-bg:      #1e0f3d; --phase4-text: #c084fc; --phase4-border: #6d28d9;
  --font-sans:      'Inter', 'Segoe UI', system-ui, sans-serif;
  --font-mono:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

.wiki-wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

.page-header { margin-bottom: 1.75rem; }
.page-header h1 { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.page-header p  { font-size: 14px; color: var(--text-secondary); }

.stats-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
.stat {
  flex: 1;
  background: var(--bg-card);
  border: var(--border-card);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
}
.stat span { display: block; font-size: 22px; font-weight: 600; color: var(--text-primary); line-height: 1.2; margin-bottom: 2px; }

.top-bar { display: flex; gap: 8px; margin-bottom: 0.75rem; }
.search-box {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg-card);
  border: var(--border-card);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font-sans);
  transition: border-color .15s;
}
.search-box::placeholder { color: var(--text-muted); }
.search-box:focus { outline: none; border: var(--border-accent); }

.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.75rem; }
.pill {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid #2e3d55;
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: background .12s, border-color .12s, color .12s;
}
.pill:hover { background: var(--bg-hover); color: var(--text-primary); border-color: #4a6080; }
.pill.active { background: var(--bg-hover); color: var(--text-primary); border: 1px solid #4a6080; font-weight: 500; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-top: 1rem; }

.card {
  background: var(--bg-card);
  border: 1px solid #2e3d55;
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  cursor: pointer;
  transition: background .12s, border-color .15s, transform .1s;
}
.card:hover { background: var(--bg-hover); border-color: #4a6080; transform: translateY(-1px); }
.card:active { transform: translateY(0); }
.card-id { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-bottom: 5px; letter-spacing: .02em; }
.card-title { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text-primary); margin-bottom: 8px; }
.card-badges { display: flex; gap: 5px; flex-wrap: wrap; }

.badge { font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 20px; letter-spacing: .02em; border: 1px solid transparent; }
.ph1 { background: var(--phase1-bg); color: var(--phase1-text); border-color: var(--phase1-border); }
.ph2 { background: var(--phase2-bg); color: var(--phase2-text); border-color: var(--phase2-border); }
.ph3 { background: var(--phase3-bg); color: var(--phase3-text); border-color: var(--phase3-border); }
.ph4 { background: var(--phase4-bg); color: var(--phase4-text); border-color: var(--phase4-border); }
.cat-badge { background: var(--bg-card); color: var(--text-secondary); border-color: #2e3d55; }

.detail {
  background: var(--bg-card);
  border: 1px solid #2e3d55;
  border-radius: var(--radius-lg);
  padding: 1.5rem;
}
.detail-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 8px; margin-bottom: 1rem; padding-bottom: 1rem;
  border-bottom: 1px solid #1e2d45;
}
.detail-id    { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.detail-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin: 4px 0 8px; line-height: 1.3; }
.detail-desc  { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 1.25rem; }
.detail-section { margin-bottom: 1.1rem; }
.detail-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 7px; }

.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tool-tag {
  font-size: 12px; font-family: var(--font-mono); padding: 3px 9px;
  border-radius: var(--radius-sm); background: #111827; color: #94a3b8;
  border: 1px solid #1e2d45;
}
.link-tag {
  font-size: 12px; font-family: var(--font-sans); padding: 4px 10px;
  border-radius: var(--radius-sm); background: #0c1f3d; color: var(--text-accent);
  border: 1px solid #1d4ed8; cursor: pointer; transition: background .12s, border-color .12s;
}
.link-tag:hover { background: #122448; border-color: #3b82f6; text-decoration: underline; }

.resume-box {
  background: #0d1e0d; border: 1px solid #166534;
  border-radius: var(--radius-md); padding: 12px 14px;
  font-size: 13px; color: #86efac; line-height: 1.6;
}
.resume-box strong { color: #4ade80; font-weight: 600; }

.back-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 13px; font-family: var(--font-sans); color: var(--text-secondary);
  background: none; border: none; cursor: pointer; padding: 0;
  margin-bottom: 1rem; transition: color .12s;
}
.back-btn:hover { color: var(--text-primary); }

.no-results { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 14px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: #2e3d55; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4a6080; }

@media (max-width: 600px) {
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; }
  .grid { grid-template-columns: 1fr 1fr; }
  .wiki-wrap { padding: 1rem; }
}
</style>
</head>
<body>
<div class="wiki-wrap">

  <div class="page-header">
    <h1>Home Lab Wiki</h1>
    <p>50 projects · click any card to explore · linked prerequisites and related projects</p>
  </div>

  <div id="app"></div>

</div>

  {id:9,title:"CUPS print server",cat:"Network",phase:1,desc:"Share any USB or network printer across your entire home network. Every computer can print without installing drivers.",tools:["CUPS","Linux","Avahi"],prereqs:[],related:[10],resume:"Linux system administration, network services"},

  {id:11,title:"Pi-hole DNS sinkhole",cat:"Network",phase:1,desc:"Block ads and tracking for every device on your network at the DNS level. No client software needed — it just works for everything.",tools:["Pi-hole","Docker","DNS"],prereqs:[12],related:[12,16],resume:"DNS administration, network-level filtering, cybersecurity basics"},

  {id:31,title:"Docker + Docker Compose",cat:"Automation",phase:1,desc:"The foundation that everything else runs on. Learn to write Compose files and you can deploy any service in minutes. Non-negotiable as skill one.",tools:["Docker","Docker Compose","YAML"],prereqs:[],related:[32,33,35],resume:"Container orchestration — foundational cloud-era skill"},

const CATS   = ["All",...[...new Set(PROJECTS.map(p=>p.cat))]];
const PHASES  = ["All","Phase 1","Phase 2","Phase 3","Phase 4"];
const PH_LBL  = {1:"Phase 1",2:"Phase 2",3:"Phase 3",4:"Phase 4"};
const PH_CLS  = {1:"ph1",2:"ph2",3:"ph3",4:"ph4"};

let state = {cat:"All",phase:"All",search:"",selected:null};

const get  = id => PROJECTS.find(p=>p.id===id);
const app  = () => document.getElementById("app");

function filtered(){
  return PROJECTS.filter(p=>{
    if(state.cat!=="All"&&p.cat!==state.cat) return false;
    if(state.phase!=="All"&&"Phase "+p.phase!==state.phase) return false;
    if(state.search){
      const q=state.search.toLowerCase();
      return p.title.toLowerCase().includes(q)||p.tools.join(" ").toLowerCase().includes(q)||p.desc.toLowerCase().includes(q);
    }
    return true;
  });
}

function render(){
  state.selected ? renderDetail() : renderGrid();
}

function renderGrid(){
  const items = filtered();
  app().innerHTML = `
  <div class="stats-row">
    <div class="stat"><span>50</span>total projects</div>
    <div class="stat"><span style="color:var(--phase1-text)">${PROJECTS.filter(p=>p.phase===1).length}</span>start now</div>
    <div class="stat"><span style="color:var(--phase2-text)">${PROJECTS.filter(p=>p.phase===2).length}</span>phase 2</div>
    <div class="stat"><span style="color:var(--phase3-text)">20</span>security</div>
  </div>
  <div class="top-bar">
    <input class="search-box" id="srch" placeholder="Search projects, tools, keywords..." value="${state.search}">
  </div>
  <div class="filter-row">
    ${CATS.map(c=>`<button class="pill${state.cat===c?" active":""}" data-cat="${c}">${c}</button>`).join("")}
  </div>
  <div class="filter-row">
    ${PHASES.map(ph=>`<button class="pill${state.phase===ph?" active":""}" data-phase="${ph}">${ph}</button>`).join("")}
  </div>
  ${items.length===0
    ? `<div class="no-results">No projects match — try a different search or filter</div>`
    : `<div class="grid">${items.map(p=>`
        <div class="card" data-id="${p.id}">
          <div class="card-id">#${String(p.id).padStart(2,"0")}</div>
          <div class="card-title">${p.title}</div>
          <div class="card-badges">
            <span class="badge ${PH_CLS[p.phase]}">${PH_LBL[p.phase]}</span>
            <span class="badge cat-badge">${p.cat}</span>
          </div>
        </div>`).join("")}
      </div>`}`;

  document.getElementById("srch").addEventListener("input",e=>{state.search=e.target.value;render()});
  document.querySelectorAll("[data-cat]").forEach(b=>b.addEventListener("click",()=>{state.cat=b.dataset.cat;render()}));
  document.querySelectorAll("[data-phase]").forEach(b=>b.addEventListener("click",()=>{state.phase=b.dataset.phase;render()}));
  document.querySelectorAll(".card").forEach(c=>c.addEventListener("click",()=>{state.selected=parseInt(c.dataset.id);render()}));
}

function renderDetail(){
  const p = get(state.selected);
  const prereqLinks = p.prereqs.map(id=>{const r=get(id);return r?`<button class="link-tag" data-nav="${id}">#${String(id).padStart(2,"0")} ${r.title}</button>`:""}).join("");
  const relLinks    = p.related.map(id=>{const r=get(id);return r?`<button class="link-tag" data-nav="${id}">#${String(id).padStart(2,"0")} ${r.title}</button>`:""}).join("");
  const toolTags    = p.tools.map(t=>`<span class="tool-tag">${t}</span>`).join("");

  app().innerHTML = `
  <button class="back-btn" id="back">← back to all projects</button>
  <div class="detail">
    <div class="detail-header">
      <div>
        <div class="detail-id">Project #${String(p.id).padStart(2,"0")} &middot; ${p.cat}</div>
        <div class="detail-title">${p.title}</div>
        <span class="badge ${PH_CLS[p.phase]}">${PH_LBL[p.phase]}</span>
      </div>
    </div>
    <p class="detail-desc">${p.desc}</p>
    ${p.prereqs.length?`<div class="detail-section"><div class="detail-label">Prerequisites</div><div class="tag-row">${prereqLinks}</div></div>`:""}
    ${p.related.length?`<div class="detail-section"><div class="detail-label">Related projects</div><div class="tag-row">${relLinks}</div></div>`:""}
    <div class="detail-section"><div class="detail-label">Tools &amp; technologies</div><div class="tag-row">${toolTags}</div></div>
    <div class="detail-section">
      <div class="detail-label">Resume skill demonstrated</div>
      <div class="resume-box"><strong>What this proves:</strong> ${p.resume}</div>
    </div>
  </div>`;

  document.getElementById("back").addEventListener("click",()=>{state.selected=null;render()});
  document.querySelectorAll("[data-nav]").forEach(b=>b.addEventListener("click",()=>{state.selected=parseInt(b.dataset.nav);render()}));
}

render();
</script>
</body>
</html>
